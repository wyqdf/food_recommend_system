services:
  elasticsearch:
    build:
      context: ./infra/elasticsearch
      dockerfile: Dockerfile
    image: food-elasticsearch:smartcn
    container_name: food-elasticsearch
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  backend:
    build:
      context: ./backend/let-me-cook
      dockerfile: Dockerfile
    container_name: food-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8081}:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: Asia/Shanghai
      SPRING_DATASOURCE_URL: jdbc:mysql://${DB_HOST:-host.docker.internal}:${DB_PORT:-3306}/${DB_NAME:-food_recommend}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048&useServerPrepStmts=true&rewriteBatchedStatements=true&cacheResultSetMetadata=true&cacheServerConfiguration=true&elideSetAutoCommits=true&maintainTimeStats=false
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      JWT_SECRET: ${JWT_SECRET:-letMeCookSecretKey2024FoodRecommendationSystem}
      SEARCH_ENGINE: ${SEARCH_ENGINE:-auto}
      SPRING_ELASTICSEARCH_URIS: ${SPRING_ELASTICSEARCH_URIS:-http://elasticsearch:9200}
      SEARCH_ES_INDEX_ALIAS: ${SEARCH_ES_INDEX_ALIAS:-recipes_search}
      SEARCH_ES_INDEX_NAME: ${SEARCH_ES_INDEX_NAME:-recipes_search_v2}
      SEARCH_ES_BATCH_SIZE: ${SEARCH_ES_BATCH_SIZE:-500}
      SEARCH_ES_AUTO_CREATE_INDEX: ${SEARCH_ES_AUTO_CREATE_INDEX:-true}
      ALIYUN_OSS_ENABLED: ${ALIYUN_OSS_ENABLED:-false}
      ALIYUN_OSS_ENDPOINT: ${ALIYUN_OSS_ENDPOINT:-oss-cn-beijing.aliyuncs.com}
      ALIYUN_OSS_ACCESS_KEY_ID: ${ALIYUN_OSS_ACCESS_KEY_ID:-}
      ALIYUN_OSS_ACCESS_KEY_SECRET: ${ALIYUN_OSS_ACCESS_KEY_SECRET:-}
      ALIYUN_OSS_BUCKET_NAME: ${ALIYUN_OSS_BUCKET_NAME:-recipe-images}
    depends_on:
      - elasticsearch

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: food-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NGINX_API_UPSTREAM: ${NGINX_API_UPSTREAM:-http://backend:8081}
    depends_on:
      - backend

volumes:
  elasticsearch_data:
