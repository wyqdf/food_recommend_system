services:
  backend:
    build:
      context: ./backend/let-me-cook
      dockerfile: Dockerfile
    container_name: food-backend
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      TZ: Asia/Shanghai
      SPRING_DATASOURCE_URL: jdbc:mysql://${DB_HOST:-host.docker.internal}:${DB_PORT:-3306}/${DB_NAME:-food_recommend}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      JWT_SECRET: ${JWT_SECRET:-letMeCookSecretKey2024FoodRecommendationSystem}
      ALIYUN_OSS_ENABLED: "true"
      ALIYUN_OSS_ENDPOINT: ${ALIYUN_OSS_ENDPOINT:-oss-cn-beijing.aliyuncs.com}
      ALIYUN_OSS_ACCESS_KEY_ID: ${ALIYUN_OSS_ACCESS_KEY_ID:-REPLACE_WITH_REAL_ACCESS_KEY_ID}
      ALIYUN_OSS_ACCESS_KEY_SECRET: ${ALIYUN_OSS_ACCESS_KEY_SECRET:-REPLACE_WITH_REAL_ACCESS_KEY_SECRET}
      ALIYUN_OSS_BUCKET_NAME: ${ALIYUN_OSS_BUCKET_NAME:-recipe-images}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: food-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
