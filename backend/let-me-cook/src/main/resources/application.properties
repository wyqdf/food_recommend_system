spring.application.name=let-me-cook

# 服务器端口
server.port=8081

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/food_recommend?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis配置
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.foodrecommend.letmecook.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.slf4j.Slf4jImpl

# JWT配置
jwt.secret=${JWT_SECRET:letMeCookSecretKey2024FoodRecommendationSystem}
jwt.expiration=86400000

# 初始化数据库（首次运行后可注释掉）
spring.sql.init.mode=never
# spring.sql.init.schema-locations=classpath:schema.sql
# spring.sql.init.data-locations=classpath:data.sql
# spring.sql.init.continue-on-error=true

# 缓存配置
spring.cache.type=simple
spring.cache.simple.time-to-live=300000
spring.cache.simple.cache-names=recommendations,categories,recommend_categories,similar_recipes,recipe_list
statistics.advanced.refresh-on-startup=true
statistics.advanced.initial-delay-ms=300000
database.migration.analyze-on-startup=false

# 搜索配置
search.engine=${SEARCH_ENGINE:auto}
spring.elasticsearch.uris=${SPRING_ELASTICSEARCH_URIS:http://127.0.0.1:9200}
search.es.index-alias=${SEARCH_ES_INDEX_ALIAS:recipes_search}
search.es.index-name=${SEARCH_ES_INDEX_NAME:recipes_search_v2}
search.es.batch-size=${SEARCH_ES_BATCH_SIZE:500}
search.es.auto-create-index=${SEARCH_ES_AUTO_CREATE_INDEX:true}

# 阿里云OSS配置
aliyun.oss.enabled=${ALIYUN_OSS_ENABLED:false}
aliyun.oss.endpoint=oss-cn-beijing.aliyuncs.com
aliyun.oss.accessKeyId=${ALIYUN_OSS_ACCESS_KEY_ID:}
aliyun.oss.accessKeySecret=${ALIYUN_OSS_ACCESS_KEY_SECRET:}
aliyun.oss.bucketName=recipe-images

# 文件上传配置
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
